# Netlify config — static site + serverless functions for auth/billing.
[build]
  publish = "."
  command = ""

# These "keys" are PUBLIC by design (Stripe Price IDs + Firebase project id) and
# intentionally also live in js/config.js — allow them past Netlify's secret scanner.
# The real secrets (STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, FIREBASE_PRIVATE_KEY,
# FIREBASE_CLIENT_EMAIL) are NOT in the repo and remain scanned.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "STRIPE_PRICE_MONTHLY,STRIPE_PRICE_ANNUAL,FIREBASE_PROJECT_ID"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Long-cache the vendored libraries (they're version-pinned and never change).
[[headers]]
  for = "/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
